[profile.default]
src = "contracts"
test = "test"
out = "out"
libs = ["lib"]
remappings = ["@openzeppelin/=lib/openzeppelin-contracts/", "forge-std/=lib/forge-std/src/"]
cache_path = "cache"
force = false
optimizer = true
optimizer_runs = 200
via_ir = true
auto_detect_remappings = true

[profile.ci]
fuzz = { runs = 1000 }
